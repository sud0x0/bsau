# bsau (brew-scan-and-update) configuration

# Path to Homebrew installation. Defaults to /opt/homebrew (Apple Silicon).
homebrew_path: /opt/homebrew

# Feature flags — opt-in to scans that require external dependencies.
# OSV vulnerability scanning always runs without any key.
features:
  ollama_scan: true      # Requires Ollama running locally (ollama serve)

# Blocking policy.
# Pre-install (Step 3): Ollama formula analysis.
# Post-install (Step 6a): Semgrep + Ollama code scan.
block_policy:
  ollama_formula_hold: true   # Block if Ollama formula analysis returns HOLD (Step 3)
  ollama_code_hold: true      # Block if Ollama code analysis returns HOLD (Step 6a)

# Ollama server URL (default: http://localhost:11434)
ollama_url: http://10.211.55.41:11434

# Ollama model to use for analysis (default: gemma3)
# Requires: ollama pull gemma3
ollama_model: gemma4:e2b

# Maximum file size in bytes sent to Ollama. Larger files are truncated.
ollama_max_file_bytes: 12000
